<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<link rel="stylesheet" th:href="@{/css/modal.css}">
	<link rel="stylesheet" th:href="@{/css/tasks.css}">
	<link rel="stylesheet" th:href="@{/css/bottun.css}">
	<link rel="stylesheet" th:href="@{/css/homeLink.css}">

	<meta charset="UTF-8">
	<title>InputYourTasks</title>
</head>

<body>
	
	<a th:href="@{/home}" class="home-link">◁ HOME</a>
	<hr>

	<!--Googleカレンダーから持ってくるボタン-->
	<button type="button" th:onclick="|location.href='@{/google/auth}'|">Googleカレンダーからタスクを取得</button>

	<hr>
	<!-- 操作ボタン -->
	<button type="button" onclick="changeStatus('DONE')">完了に変更</button>
	<button type="button" onclick="changeStatus('TODO')">未完了に変更</button>
	<button type="button" onclick="openModal()">タスクを追加</button>
	<button type="button" onclick="confirmDelete()">タスク削除</button>


	<!-- 削除フォーム -->
	<form id="deleteForm" action="/task/delete" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
	</form>

	<!-- ステータス変更フォーム -->
	<form id="statusForm" action="/task/status" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<input type="hidden" name="status" id="statusValue">
		<!--ページ判別用の引数↓-->
		<input type="hidden" name="redirectTo" value="tasksPage">
	</form>

	
	
	<!-- タスク一覧テーブル -->
	<table>
		<thead>
			<tr>
				<th></th>
				<th>ステータス</th>
				<th>タイトル</th>
				<th class="wrap">詳細</th>
				<th class="no-wrap">開始</th>
				<th></th>
				<th class="no-wrap">期限</th>
				<th></th>
				<th class="wrap">場所</th>
				<th></th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="task : ${tasks}">
				<td><input type="checkbox" class="taskCheck" th:value="${task.taskId}"></td>
				
				<td th:text="${task.status}"></td>
				<td th:text="${task.title}"></td>
				<td class="wrap" th:text="${task.description}"></td>


				<!-- 開始時間：startDate nullガード -->

				<td class="no-wrap"
					th:text="${task.startDate != null ? #temporals.format(task.startDate, 'MM月dd日(E)') : ''}"></td>
				<td th:text="${task.startTime}"></td>

				<!-- 期限：dueDate nullガード -->
				<td class="no-wrap"
					th:text="${task.dueDate != null ? #temporals.format(task.dueDate, 'MM月dd日(E)') : ''}"></td>
				<td th:text="${task.dueTime}"></td>

				<td>
					<a class="wrap" th:if="${task.location != null}"
						th:href="'https://www.google.com/maps/search/?api=1&query=' + ${task.location}" target="_blank"
						th:text="${task.location}"></a>
				</td>

				<td>
					<!--編集ボタンに現在のパラメータを渡す-->
					<button type="button" class="editBtn" th:data-task-id="${task.taskId}" th:data-title="${task.title}"
						th:data-description="${task.description}" th:data-priority="${task.priority}"
						th:data-start-date="${task.startDate}" th:data-start-time="${task.startTime}"
						th:data-due-date="${task.dueDate}" th:data-due-time="${task.dueTime}"
						th:data-location="${task.location}" onclick="openEditModalFromBtn(this)">編集</button>
				</td>
			</tr>
		</tbody>
	</table>


	<!-- タスク登録モーダル -->
	<div id="taskModal" class="modal">
		<div class="modal-inner">
			<h2>タスク登録</h2>
			<form action="/addTask" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<p>タスク名<input type="text" name="title"></p>
				<p>備考<input type="text" name="description"></p>
				<p>優先度
					<select name="priority">
						<option value="1">低</option>
						<option value="2">中</option>
						<option value="3">高</option>
					</select>
				</p>
				<p>開始
					<input type="date" name="startDate"
						th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
					<input type="time" name="startTime"
						th:value="${#temporals.format(#temporals.createNow(), 'HH:mm')}">
				</p>
				<p>期限
					<input type="date" name="dueDate"
						th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
					<input type="time" name="dueTime">
				</p>
				<p>場所の指定<input type="text" name="location"></p>

				<!--ページ判別用の引数↓-->
				<input type="hidden" name="redirectTo" value="tasksPage">


				<button type="submit">タスク登録</button>
				<button type="button" onclick="closeModal()">閉じる</button>
			</form>
		</div>
	</div>

	<!-- タスク編集モーダル -->
	<div id="editModal" class="modal">
		<div class="modal-inner">
			<h2>タスク編集</h2>
			<form action="/task/edit" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<input type="hidden" id="editTaskId" name="taskId">
				<p>タスク名<input type="text" id="editTitle" name="title"></p>
				<p>備考<input type="text" id="editDescription" name="description"></p>
				<p>優先度
					<select id="editPriority" name="priority">
						<option value="1">低</option>
						<option value="2">中</option>
						<option value="3">高</option>
					</select>
				</p>
				<p>開始
					<input type="date" id="editStartDate" name="startDate">
					<input type="time" id="editStartTime" name="startTime">
				</p>
				<p>期限
					<input type="date" id="editDueDate" name="dueDate">
					<input type="time" id="editDueTime" name="dueTime">
				</p>
				<p>場所の指定<input type="text" id="editLocation" name="location"></p>
				<button type="submit">更新</button>
				<button type="button" onclick="closeEditModal()">閉じる</button>
			</form>
		</div>
	</div>

	<!--javaScript読む-->
	<script th:src="@{/script/tasks.js}"></script>

</body>

</html>
