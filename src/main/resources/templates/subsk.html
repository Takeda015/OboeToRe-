<!--/OboeToRe/src/main/resources/templates/subsk.html-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>サブスクの一覧</title>
	<link rel="stylesheet" th:href="@{/css/bottun.css}">
	<link rel="stylesheet" th:href="@{/css/homeLink.css}">
	<link rel="stylesheet" th:href="@{/css/sbsk.css}">
	<link rel="stylesheet" th:href="@{/css/modal.css}">
	<link rel="stylesheet" th:href="@{/css/menu.css}">
	<link rel="stylesheet" th:href="@{/css/table.css}">
</head>

<body>

	<a th:href="@{/home}" class="home-link">◁ HOME</a>

	<!--スクレイピングエラーでる。やってる時間がないので、一旦は普通に手動登録として実装へ変更-->
	<!--現在の一覧表示-->
	<p><button class="btn btn-primary" onclick="openSbskModal()">加入中サブスクの追加</button>
		<button class="btn btn-primary" onclick="delSbsk()">削除</button>

	</p>


	<!--削除フォ～ム-->
	<form id="delSbskForm" action="/sbsk/del" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
	</form>


	<!--表の出力-->
	<div class="TableWrap">
	<table>
		<thead>
			<tr>
				<th></th>
				<th>サブスク名</th>
				<th>開始日</th>
				<th>更新日</th>
				<th></th>
			</tr>
		</thead>

		<!--買い物リストを持ってきて表示してる部分-->
		<!--あとで値段をいれる-->
		<tbody>
			<tr th:each="SbskLists : ${SbskLists}">
				<td><input type="checkbox" class="sbskCheck" th:value="${SbskLists.subskId}"></td>
				<td th:text="${SbskLists.subskName}"></td>
				<td th:text="${SbskLists.joinedAt}"></td>
				<td th:text="${SbskLists.updateAt}"></td>

				<td>
					<!--編集ボタンに現在のパラメータを渡す-->
					<button type="button" class="editBtn" th:data-subskId="${SbskLists.subskId}"
						th:data-subskName="${SbskLists.subskName}" th:data-joinedAt="${SbskLists.joinedAt}"
						th:data-updateAt="${SbskLists.updateAt}" th:data-updateDays="${SbskLists.updateDays}"
						onclick="openEditModal(this)">編集</button>
				</td>
			</tr>
		</tbody>
	</table>
	</div>



	<!--追加のモーダル-->
	<div id="addSbskModal" class="modal">
		<div class="modal-inner">
			<h2>サブスクの追加</h2>
			<form action="/addSbsk" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

				<p>サブスク名</p>
				<input type="text" name="subskName" class="textInput">


				<p>利用開始日</p>
				<input type="date" name="joinedAt" class="textInput"
					th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">

				<p>課金の更新日を：</p>
				<!--トグルで選択させる,thisで判別-->
				<p>
					<label><input type="radio" name="updateMode" value="days" checked
							onchange="toggleUpdateMode(this)">開始日から日数で指定</label>
					<label><input type="radio" name="updateMode" value="direct"
							onchange="toggleUpdateMode(this)">日付を直接指定</label>
				</p>


				<!--選択内容：日数-->
				<p class="daysGroup">開始日から
					<input type="number" name="updateDays" min="1" value="30" class="dateInput">日後
				</p>

				<!--選択内容：更新日-->
				<p class="directGroup" style="display:none;">更新日
					<input type="date" name="updateAt" disabled class="dateInput"
						th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
				</p>
				<div class="sendButton">
					<button type="submit">追加</button>
					<button type="button" onclick="closeSbskModal()">閉じる</button>
				</div>
			</form>
		</div>
	</div>

	<!-- 編集モーダル -->
	<div id="editModal" class="modal">
		<div class="modal-inner">
			<h2>編集</h2>
			<form action="/sbsk/edit" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<input type="hidden" name="subskId">

				<p>サブスク名</p>
				<input type="text" name="subskName" class="textInput">

				<p>開始日</p>
				<input type="date" name="joinedAt" class="textInput"
					th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">

				<!--トグルで選択させる-->
				<p>
					<label><input type="radio" name="updateMode" value="days"
							onchange="toggleUpdateMode(this)">開始日から日数で指定</label>
					<label><input type="radio" name="updateMode" value="direct" checked
							onchange="toggleUpdateMode(this)">日付を直接指定</label>
				</p>


				<!--選択内容：日数-->
				<p class="daysGroup" style="display:none;">開始日から
					<input type="number" name="updateDays" min="1" class="dateInput">日後
				</p>


				<!--選択内容：更新日-->
				<p class="directGroup" style="display:none;">更新日
					<input type="date" name="updateAt" disabled class="dateInput"
						th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
				</p>
				<div class="sendButton">
					<button type="submit">更新</button>
					<button type="button" onclick="closeEditModal()">閉じる</button>
				</div>
			</form>
		</div>
	</div>

	<!--＝＝＝各画面へのボタン＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝-->
	<div class="menu-wrapper">
		<button id="menuBtn" onclick="toggleMenu()">メニュー ▼</button>

		<div id="dropdownMenu" class="dropdown hidden">
			<a href="/chat" class="menu-item"> チャット画面へ</a>
			<a href="/task" class="menu-item"> タスク一覧</a>
			<a href="/subsk" class="menu-item"> サブスク一覧</a>
			<a href="/sList" class="menu-item"> 買い物リスト</a>
			<a href="/profile" class="menu-item"> プロフィール</a>
			<form action="/logout" method="post" onsubmit="return confirm('ログアウトしますか？')">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<button type="submit" class="menu-item">ログアウト</button>
			</form>
		</div>

	</div>
	<!--menuのjavaScript読む-->
	<script th:src="@{/script/menu.js}"></script>

	<!--スクリプトの読み込み-->
	<script th:src="@{/script/subsk.js}"></script>
</body>

</html>
