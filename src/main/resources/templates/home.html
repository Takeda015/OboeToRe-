<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>OboeToRe_HOME</title>
	<link rel="stylesheet" th:href="@{/css/home.css}">
	<link rel="stylesheet" th:href="@{/css/modal.css}">
	<link rel="stylesheet" th:href="@{/css/bottun.css}">
	<link rel="stylesheet" th:href="@{/css/animation.css}">
	<link rel="stylesheet" th:href="@{/css/menu.css}">
</head>

<body>

	<!-- バー -->
	<div class="drop-bar-container">
		<div class="drop-bar"></div>
		<div class="drop-bar"></div>
		<div class="drop-bar"></div>
		<!--		<div class="drop-bar"></div>-->
		<!--		<div class="drop-bar"></div>-->

	</div>

	<div class="haikei"></div>

	<!--左右分割-->
	<div class="flex-container">
		<div class="leftSide"><!--左側開始-->
			<div class="datetime-ticker">
				<span id="datetimeText" class="datetime-ticker-text"></span>
			</div>

			<!--＝＝＝＝＝常時表示部分＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝-->
			<!-- today は LocalDate なので #temporals.format で整形 -->
			<!-- スクロールさせたい -->
			<div class="taskArea1">

				<div class="area-header">
					<!--					<h3 th:text="${#temporals.format(today, 'MM月dd日')} + 'まで／無期限のタスク'"></h3>-->
					<h3 th:text="'今日まで／無期限のタスク'"></h3>
					<button type="button" onclick="changeTaskStatus('DONE')">完了</button>
					<button onclick="openTaskModal()">追加</button>
				</div>
				<div class="scroll-wrapper">
					<div class="overflow-auto">
						<table>
							<thead>
								<tr>
									<th>チェック</th>
									<th>タイトル</th>
									<th>詳細</th>
									<th>開始</th>
									<th>期限</th>
									<th>場所</th>

								</tr>
							</thead>

							<!--持ってきて表示してる部分-->
							<tbody>
								<tr th:each="task : ${tasks}">
									<td><input type="checkbox" class="taskCheck" th:value="${task.taskId}"></td>
									<td th:text="${task.title}"></td>
									<td th:text="${task.description}"></td>
									<td>
										<span
											th:text="${task.startDate != null ? #temporals.format(task.startDate, 'MM/dd') : ''}"></span>
										<span th:text="${task.startTime != null ? task.startTime : ''}"></span>
									</td>
									<td>
										<span
											th:text="${task.dueDate != null ? #temporals.format(task.dueDate, 'MM/dd') : ''}"></span>
										<span th:text="${task.dueTime != null ? task.dueTime : ''}"></span>
									</td>
									<!--									<td th:text="${task.location != null ? task.location : ''}"></td>-->
									<td>
										<!--ここでリンクとしてグーグルマップ開くようにしてる-->
										<a th:if="${task.location != null}"
											th:href="'https://www.google.com/maps/search/?api=1&query=' + ${task.location}"
											target="_blank" th:text="${task.location}"></a>
									</td>
								</tr>

								<tr th:each="noLimTask : ${noLimTasks}">
									<td><input type="checkbox" class="taskCheck" th:value="${noLimTask.taskId}"></td>
									<td th:text="${noLimTask.title}"></td>
									<td th:text="${noLimTask.description}"></td>

									<td>
										<span
											th:text="${noLimTask.startDate != null ? #temporals.format(noLimTask.startDate, 'MM/dd') : '-'}">
										</span>
									</td>
									<td>-</td>

									<td>
										<!--ここでリンクとしてグーグルマップ開くようにしてる-->
										<a th:if="${noLimTask.location != null}"
											th:href="'https://www.google.com/maps/search/?api=1&query=' + ${noLimTask.location}"
											target="_blank" th:text="${noLimTask.location}"></a>
									</td>

								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>


			<!--買い物リスト===================-->
			<div class="shoppingListArea">
				<div class="area-header">
					<h3>買い物リスト</h3>
					<button type="button" onclick="changeSpngStatus('DONE')">完了</button>
					<button onclick="openSListModal()">追加</button>
				</div>

				<div class="scroll-wrapper">
					<div class="overflow-auto">
						<table>
							<thead>
								<tr>
									<th>チェック</th>
									<th>買うもの</th>
									<th>詳細</th>
								</tr>
							</thead>

							<!--買い物リストを持ってきて表示してる部分-->
							<tbody>
								<tr th:each="todoSLists : ${todoSLists}">
									<td><input type="checkbox" class="sListCheck" th:value="${todoSLists.shoppingId}">
									</td>
									<td th:text="${todoSLists.itemName}"></td>
									<td th:text="${todoSLists.description}"></td>

								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>





		</div><!--左側終了-->
		<!--↓ここから下は画面の右側======================================-->

		<div class="right-col">

			<!--＝＝＝各画面へのボタン＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝-->
			<div class="menu-wrapper">
				<button id="menuBtn" onclick="toggleMenu()">メニュー ▼</button>

				<div id="dropdownMenu" class="dropdown hidden">
					<a href="/chat" class="menu-item"> チャット画面へ</a>
					<a href="/task" class="menu-item"> タスク一覧</a>
					<a href="/subsk" class="menu-item"> サブスク一覧</a>
					<a href="/sList" class="menu-item"> 買い物リスト</a>
					<a href="/profile" class="menu-item"> プロフィール</a>
					<form action="/logout" method="post" onsubmit="return confirm('ログアウトしますか？')">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<button type="submit" class="menu-item">ログアウト</button>
					</form>
				</div>

			</div>



			<!-- リマインド＋キャラ横並び -->
			<div class="reminder-char-area">
				<div class="char_reminder">
					<p th:text="${reminder}"></p>
				</div>
				<img class="char_image" th:src="@{/img/chara.png}" alt="キャラクター">
				
				<div class="floating-rect1"></div>
				<div class="floating-rect2"></div>
				
			</div>
			
			


		</div><!--右側終了-->
	</div><!--左右分割終了-->

	<!--以下機能部分-->

	<!-- ステータス変更フォーム -->
	<form id="statusForm" action="/task/status" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<input type="hidden" name="status" id="statusValue">
		<!--ページ判別用の引数↓-->
		<input type="hidden" name="redirectTo" value="homePage">

	</form>

	<!-- 買い物リストのステータス変更フォーム -->
	<form id="sListStatusForm" action="/sList/status" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<input type="hidden" name="status" id="sListStatusValue">
		<!--ページ判別用の引数↓-->
		<input type="hidden" name="redirectTo" value="homePage">
	</form>



	<!--★★==============モーダル==============================-->
	<!-- タスク登録モーダル -->
	<div id="taskModal" class="modal">
		<div class="modal-inner">
			<h2>タスク登録</h2>
			<form action="/addTask" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<p>タスク名</p>
				<input type="text" name="title" class="textInput">
				<p>備考</p>
				<input type="text" name="description" class="textInput">

				<p>開始 </p>
				<input type="date" name="startDate" class="dateInput"
					th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
				<input type="time" name="startTime" class="dateInput">


				<p>期限</p>
				<input type="date" name="dueDate" class="dateInput">

				<input type="time" name="dueTime" class="dateInput">
				<p>優先度
					<select name="priority">
						<option value="1">低</option>
						<option value="2">中</option>
						<option value="3">高</option>
					</select>
				</p>
				<p>場所の指定</p>
				<input type="text" name="location" class="textInput">


				<!--ページ判別用の引数↓-->
				<input type="hidden" name="redirectTo" value="homePage">

				<div class="sendButton">
					<button type="submit">タスク登録</button>
					<button type="button" onclick="closeTaskModal()">閉じる</button>
				</div>
			</form>
		</div>
	</div>

	<!--買い物リスト追加のモーダル-->
	<div id="sListModal" class="modal">
		<div class="modal-inner">
			<h2>買い物リスト追加</h2>
			<form action="/sList" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<p>買うもの</p>
				<input type="text" name="itemName" class="textInput">
				<p>備考</p>
				<input type="text" name="description" class="textInput">
				<br>
				<!--ページ判別用の引数↓-->
				<input type="hidden" name="redirectTo" value="homePage">

				<div class="sendButton">
					<button type="submit">登録</button>
					<button type="button" onclick="closeSListModal()">閉じる</button>
				</div>
			</form>
		</div>
	</div>


	<!--=======スクリプト呼び出し==========-->

	<script th:src="@{/script/home.js}"></script>
	<script th:src="@{/script/menu.js}"></script>



</body>

</html>
